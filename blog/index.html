<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJS Creative Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Archivo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --white: #ffffff;
  --black: #0d0d0d;
  --off-white: #f5f4f0;
  --gray: #7b7b74;
  --gray-light: #e8e7e3;
  --accent: #ff3c1f;
  --sans: 'Archivo', 'Helvetica Neue', sans-serif;
  --serif: 'Cormorant Garamond', Georgia, serif;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--white);
  color: var(--black);
  font-family: var(--sans);
  line-height: 1.5;
  overflow-x: hidden;
}

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.8rem 3rem;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(10px);
}

nav::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 3rem;
  right: 3rem;
  height: 1px;
  background: rgba(0, 0, 0, 0.1);
}

.nav-logo,
.footer-logo {
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 0.85rem;
}

.nav-icon {
  width: 42px;
  height: 42px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 999px;
  color: var(--black);
  text-decoration: none;
  background: rgba(255, 255, 255, 0.82);
  transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
}

.nav-icon:hover {
  transform: translateY(-2px);
  color: var(--accent);
  border-color: rgba(255, 60, 31, 0.28);
}

.nav-icon svg {
  width: 18px;
  height: 18px;
}

.blog-shell {
  min-height: 100vh;
  padding: 8.5rem 3rem 4rem;
  background:
    radial-gradient(circle at top right, rgba(255, 60, 31, 0.12), transparent 28%),
    linear-gradient(135deg, rgba(255, 60, 31, 0.02), transparent 55%, rgba(13, 13, 13, 0.03));
}

.blog-hero {
  max-width: 1100px;
  margin: 0 auto 3rem;
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 2rem;
  align-items: end;
}

.eyebrow {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 1rem;
}

.hero-title {
  font-size: clamp(2.8rem, 7vw, 6rem);
  line-height: 0.95;
  letter-spacing: -0.05em;
  max-width: 700px;
}

.hero-title .italic {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 500;
}

.hero-copy {
  max-width: 440px;
  color: var(--gray);
  font-size: 1rem;
  line-height: 1.8;
  justify-self: end;
}

.blog-frame {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem;
  border: 1px solid var(--gray-light);
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.9);
  box-shadow: 0 24px 60px rgba(13, 13, 13, 0.08);
}

#blog-container {
  display: grid;
  gap: 1.5rem;
}

#blog-container:empty::before {
  content: 'Posts are loading...';
  display: block;
  padding: 3rem 1.5rem;
  text-align: center;
  color: var(--gray);
  font-size: 0.95rem;
  border: 1px dashed var(--gray-light);
  border-radius: 20px;
}

.post {
  padding: 2rem;
  border: 1px solid var(--gray-light);
  border-radius: 22px;
  background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(245,244,240,0.92));
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.post:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 36px rgba(13, 13, 13, 0.08);
  border-color: rgba(255, 60, 31, 0.2);
}

.post h2 {
  margin-bottom: 0.85rem;
  font-size: clamp(1.7rem, 3vw, 2.4rem);
  line-height: 1;
  letter-spacing: -0.04em;
}

.post h2 a {
  color: var(--black);
  text-decoration: none;
}

.post h2 a:hover {
  color: var(--accent);
}

.post p {
  color: var(--gray);
  font-size: 0.98rem;
  line-height: 1.8;
}

.post img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 18px;
  margin-bottom: 1.2rem;
}

footer {
  padding: 2rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  background: var(--off-white);
}

.footer-copy {
  font-size: 0.74rem;
  color: var(--gray);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

@media (max-width: 900px) {
  nav,
  footer {
    padding-left: 1.4rem;
    padding-right: 1.4rem;
  }

  nav::after {
    left: 1.4rem;
    right: 1.4rem;
  }

  .blog-shell {
    padding: 7rem 1.4rem 3rem;
  }

  .blog-hero {
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  .hero-copy {
    justify-self: start;
  }
}

@media (max-width: 640px) {
  .blog-frame,
  .post {
    padding: 1.3rem;
  }

  footer {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="#top">KJS Creative</a>
    <div class="nav-right">
      <a class="nav-icon" href="javascript:history.back()" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5"></path>
          <path d="M12 19l-7-7 7-7"></path>
        </svg>
      </a>
      <a class="nav-icon" href="/" aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 9.5V21h14V9.5"></path>
        </svg>
      </a>
    </div>
  </nav>

  <main class="blog-shell" id="top">
    <section class="blog-hero">
      <div>
        <span class="eyebrow">Journal / Essays / Creative Direction</span>
        <h1 class="hero-title">Blog</h1>
      </div>
      <p class="hero-copy">KJS theme preserved with your Sanity-powered blog connected below.</p>
    </section>

    <section class="blog-frame">
      <div id="blog-container"></div>
    </section>
  </main>

  <footer>
    <a class="footer-logo" href="#top">KJS Creative</a>
    <p class="footer-copy">Editorial aesthetic with live blog content</p>
  </footer>

  <script src="../js/sanity.js"></script>
</body>
</html>
